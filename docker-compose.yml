services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment
      POSTGRES_DB: payments
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d payments"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://payment:payment@postgres:5432/payments
      BANK_BIN: ${BANK_BIN:-YOUR_BANK_BIN}
      BANK_ACCOUNT_NUMBER: ${BANK_ACCOUNT_NUMBER:-YOUR_ACCOUNT_NUMBER}
      BANK_ACCOUNT_NAME: ${BANK_ACCOUNT_NAME:-YOUR_NAME}
      BANK_CODE: ${BANK_CODE:-GENERIC}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-change_me_in_production}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
