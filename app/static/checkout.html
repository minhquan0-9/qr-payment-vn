<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thanh toán</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; max-width: 520px; margin: 24px auto; padding: 0 16px; }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  .qr { display: flex; justify-content: center; padding: 16px; background: white; border-radius: 12px; }
  .qr img { max-width: 100%; height: auto; }
  .info { display: grid; gap: 6px; padding: 16px 0; }
  .row { display: flex; justify-content: space-between; gap: 12px; }
  .row .k { opacity: 0.7; }
  .row .v { font-weight: 600; font-variant-numeric: tabular-nums; }
  .status { padding: 12px; border-radius: 8px; text-align: center; font-weight: 600; }
  .status.pending { background: #fef3c7; color: #92400e; }
  .status.paid { background: #d1fae5; color: #065f46; }
  .status.expired, .status.canceled { background: #fee2e2; color: #991b1b; }
  .countdown { font-variant-numeric: tabular-nums; }
  code { background: #00000022; padding: 1px 6px; border-radius: 4px; }
  .copy { cursor: pointer; text-decoration: underline dotted; }
</style>
</head>
<body>
  <h1>Quét QR để thanh toán</h1>
  <div id="status" class="status pending">Đang chờ thanh toán…</div>

  <div class="qr"><img id="qr" alt="QR thanh toán"></div>

  <div class="info">
    <div class="row"><span class="k">Số tiền</span><span class="v" id="amount">—</span></div>
    <div class="row"><span class="k">Nội dung CK</span>
      <span class="v"><code id="code" class="copy" title="Bấm để copy">—</code></span>
    </div>
    <div class="row"><span class="k">Hết hạn sau</span><span class="v countdown" id="countdown">—</span></div>
  </div>

  <p style="font-size:.85rem;opacity:.75">
    Quan trọng: nhập đúng <strong>nội dung chuyển khoản</strong> hiển thị ở trên.
    Nếu nội dung sai hoặc thiếu mã, hệ thống sẽ không tự xác nhận được.
  </p>

<script>
const orderCode = location.pathname.split('/').pop();
const $ = (id) => document.getElementById(id);
const fmt = (n) => Number(n).toLocaleString('vi-VN') + ' đ';

let expiresAt = null;
let countdownTimer = null;

function setStatus(s) {
  const el = $('status');
  el.className = 'status ' + s;
  el.textContent = ({
    pending: 'Đang chờ thanh toán…',
    paid: '✓ Đã thanh toán thành công',
    expired: 'Đơn đã hết hạn',
    canceled: 'Đơn đã huỷ',
  })[s] || s;
}

function startCountdown() {
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    if (!expiresAt) return;
    const ms = new Date(expiresAt).getTime() - Date.now();
    if (ms <= 0) {
      $('countdown').textContent = '00:00';
      clearInterval(countdownTimer);
      return;
    }
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    $('countdown').textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }, 500);
}

async function loadInitial() {
  const res = await fetch('/api/orders/' + orderCode);
  if (!res.ok) {
    setStatus('expired');
    $('status').textContent = 'Không tìm thấy đơn hàng';
    return;
  }
  const o = await res.json();
  $('qr').src = o.qr_url;
  $('amount').textContent = fmt(o.amount);
  $('code').textContent = o.order_code;
  expiresAt = o.expires_at;
  setStatus(o.status);
  if (o.status === 'pending') {
    startCountdown();
    subscribe();
  }
}

function subscribe() {
  const es = new EventSource('/api/orders/' + orderCode + '/stream');
  es.addEventListener('snapshot', (e) => {
    try { setStatus(JSON.parse(e.data).status); } catch (err) { /* noop */ }
  });
  es.addEventListener('paid', () => { setStatus('paid'); es.close(); });
  es.addEventListener('expired', () => { setStatus('expired'); es.close(); });
  es.addEventListener('canceled', () => { setStatus('canceled'); es.close(); });
  es.addEventListener('ping', () => {});
  es.onerror = () => { /* tự reconnect */ };
}

$('code').addEventListener('click', () => {
  navigator.clipboard?.writeText($('code').textContent);
});

loadInitial();
</script>
</body>
</html>
